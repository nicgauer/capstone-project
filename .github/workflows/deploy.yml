name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nicgauer/capstone-project:latest
            ghcr.io/nicgauer/capstone-project:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: /opt/capstone

      # Regenerates .env from repo secrets on every deploy, so config changes
      # (rotating SECRET_KEY, etc.) never require a manual SSH session.
      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: DOMAIN,SECRET_KEY,POSTGRES_PASSWORD
          script: |
            cat > /opt/capstone/.env <<ENVEOF
            DOMAIN=$DOMAIN
            APP_ORIGINS=https://$DOMAIN
            SECURE_COOKIES=true
            SECRET_KEY=$SECRET_KEY
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            ENVEOF
            chmod 600 /opt/capstone/.env

            cd /opt/capstone
            docker compose pull app
            docker compose up -d
            docker image prune -f
